<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/style.css" />
    <title>Kugo Test-Drive</title>
  </head>
  <body>
    <header class="header">
      <div class="container">
        <div class="header-top">
          <div class="header-work">
            <ul class="header-work-list">
              <li class="header-work-item">
                <a href="#" class="header-work-link">Сервис</a>
              </li>
              <li class="header-work-item">
                <a href="#" class="header-work-link">Сотрудничество</a>
              </li>
              <li class="header-work-item">
                <a href="#" class="header-work-link">Заказать звонок</a>
              </li>
            </ul>
            <div class="header-socials">
              <div class="header-socials-icons">
                <a href="#" class="header-socials-icon-item">
                  <svg class="socials-logo">
                    <use href="./img/sprite.svg#viber"></use>
                  </svg>
                </a>
                <a href="#" class="header-socials-icon-item">
                  <svg class="socials-logo">
                    <use href="./img/sprite.svg#whatsapp"></use>
                  </svg>
                </a>
                <a href="#" class="header-socials-icon-item">
                  <svg class="socials-logo">
                    <use href="./img/sprite.svg#telegram"></use>
                  </svg>
                </a>
              </div>
            </div>
          </div>

          <div class="header-socials-phone">
            <a href="tel:+78005055461" class="header-phone"
              >+7 (800) 505-54-61</a
            >
          </div>
        </div>
      </div>
      <div class="header-line"></div>
      <div class="container">
        <div class="header-content">
          <a href="#" class="header-logo">
            <svg class="header-logo-svg">
              <use href="./img/sprite.svg#Kugoo"></use>
            </svg>
          </a>
          <a class="button header-button">
            <div class="header-button-burger">
              <div class="header-burger-line"></div>
              <div class="header-burger-line"></div>
              <div class="header-burger-line"></div>
            </div>
            <span class="header-button-text">Каталог</span>
          </a>
          <form action="#" class="header-search">
            <input
              type="text"
              class="header-search-input"
              placeholder="Искать самокат KUGO"
            />
            <button class="button-search">
              <svg class="button-search-svg">
                <use href="./img/sprite.svg#Search"></use>
              </svg>
            </button>
          </form>
          <div class="header-actions">
            <a href="#" class="header-compare">
              <svg class="header-actions-icon">
                <use href="./img/sprite.svg#vesi"></use>
              </svg>
            </a>
            <a href="#" class="header-favorite">
              <svg class="header-actions-icon">
                <use href="./img/sprite.svg#Heart"></use>
              </svg>
            </a>
            <a href="#" class="header-cart">
              <svg class="header-actions-icon">
                <use href="./img/sprite.svg#shopping-cart-header"></use>
              </svg>
              <span class="header-cart-text">Корзина</span>
            </a>
          </div>
        </div>
      </div>
    </header>

    <script src="./js/main.js"></script>
  </body>
</html>
